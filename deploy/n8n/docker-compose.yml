services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: []
    dns_opt:
      - ndots:0
    networks:
      - tg_net
      - default

networks:
  tg_net:
    external: true

volumes:
  n8n_data:
