# Nginx config cho portal.veraglobal.vn
# Dùng SAU KHI đã có SSL cert từ certbot
# Copy vào: /etc/nginx/conf.d/domains/portal.veraglobal.vn.ssl.conf

# HTTP -> HTTPS redirect
server {
    listen 72.60.40.232:80;
    server_name portal.veraglobal.vn;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 72.60.40.232:443 ssl;
    server_name portal.veraglobal.vn;

    # SSL certificates (certbot)
    ssl_certificate     /etc/letsencrypt/live/portal.veraglobal.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.veraglobal.vn/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_PORTAL:10m;
    ssl_session_timeout 10m;

    # Upload file size (app có tính năng upload media)
    client_max_body_size 50m;

    # Proxy tới Next.js (port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/portal.veraglobal.vn.access.log;
    error_log  /var/log/nginx/portal.veraglobal.vn.error.log;
}
