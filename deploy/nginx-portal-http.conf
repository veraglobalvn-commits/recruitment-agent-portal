# Nginx config TẠM THỜI cho portal.veraglobal.vn (CHỈ HTTP)
# Bước 1: Copy vào /etc/nginx/conf.d/domains/portal.veraglobal.vn.conf
# Bước 2: nginx -t && systemctl reload nginx
# Bước 3: certbot certonly --nginx -d portal.veraglobal.vn
# Bước 4: Sau khi cert OK, dùng nginx-portal.conf (SSL) thay thế

server {
    listen 80;
    listen [::]:80;
    server_name portal.veraglobal.vn;

    # Cho phép certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 200 'portal coming soon';
        add_header Content-Type text/plain;
    }
}
