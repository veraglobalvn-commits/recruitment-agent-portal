# Nginx snippet cho location /tg-media/ — proxy file Telegram (avatar, video, passport)
# qua telegram-bot-api self-host server.
#
# CÁCH DÙNG:
#   1. Mở /etc/nginx/conf.d/domains/portal.veraglobal.vn.ssl.conf
#   2. Thêm BLOCK dưới ngay TRƯỚC `location / { ... }` (vị trí matching cụ thể trước generic)
#   3. nginx -t && systemctl reload nginx
#
# BẢO MẬT:
#   - Token bot được giấu server-side (BOT_TOKEN nằm trong nginx, KHÔNG lộ ra URL public)
#   - Browser truy cập: https://portal.veraglobal.vn/tg-media/videos/file_xxx.mp4
#   - Nginx upstream: http://127.0.0.1:8081/file/bot<TOKEN>/videos/file_xxx.mp4
#   - File-path là random hash 32+ ký tự → khó guess (security through obscurity)
#   - (Optional) Bổ sung HMAC signed URL nếu cần auth strict (xem runbook section 7)

# Hằng số: thay <BOT_TOKEN> bằng giá trị thật khi config trên VPS
# (Hoặc dùng nginx `set` directive đọc từ env, nhưng inline đơn giản hơn)

location ^~ /tg-media/ {
    # Tắt access log cho file media (giảm noise)
    access_log /var/log/nginx/portal.veraglobal.vn.tg-media.access.log;
    error_log  /var/log/nginx/portal.veraglobal.vn.tg-media.error.log;

    # Strip prefix /tg-media/ → forward path tới upstream
    # Vd: /tg-media/videos/file_xxx.mp4 → /file/bot<TOKEN>/videos/file_xxx.mp4
    rewrite ^/tg-media/(.*)$ /file/bot__BOT_TOKEN__/$1 break;
    proxy_pass http://127.0.0.1:8081;

    # Headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cho phép stream video lớn (~ vài trăm MB)
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;

    # Timeouts (video lớn cần thời gian)
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # Cache control: file Telegram immutable (file_id một lần) → cache lâu OK
    add_header Cache-Control "public, max-age=86400, immutable" always;

    # CORS (nếu agent portal cần fetch file qua JS, hiện chỉ <video src> tag — không cần CORS)
    # add_header Access-Control-Allow-Origin "https://portal.veraglobal.vn" always;
}
