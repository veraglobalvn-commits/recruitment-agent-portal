services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: always
    # Bind cho nginx host gọi qua localhost:8082 (proxy /tg-media/)
    # Port 8081 bị chiếm bởi vikunja trên VPS này → dùng 8082
    ports:
      - "127.0.0.1:8082:8081"
    # Tham gia n8n_default để n8n gọi qua service name + có internet access
    networks:
      - n8n_default
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      # KHÔNG set TELEGRAM_LOCAL=1: giữ default mode (file_path relative)
      # → HTTP pattern y hệt cloud, chỉ đổi base URL trong workflow
      # Nếu sau này muốn tối ưu (truy cập file qua filesystem thay vì HTTP) → bật flag này
      # và update workflow parse file_path absolute.
      TELEGRAM_STAT: "0"
      TELEGRAM_VERBOSITY: "1"
    volumes:
      # Persistent storage cho file cache
      - tg-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # File server: serve cached Telegram files qua HTTP
  # n8n download passport/avatar qua: http://file-server:9000/<TOKEN>/<file_path>
  # nginx /tg-media/ proxy qua: http://127.0.0.1:9000/<TOKEN>/<file_path>
  file-server:
    image: python:3.11-alpine
    container_name: tg-file-server
    restart: always
    working_dir: /data
    command: python -m http.server 9000
    volumes:
      - tg-bot-api-data:/data:ro
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - n8n_default

volumes:
  tg-bot-api-data:
    driver: local

networks:
  n8n_default:
    external: true
    # Network được tạo tự động bởi n8n docker-compose (project name = n8n)
    # Đảm bảo n8n đã chạy trước khi start telegram-bot-api
